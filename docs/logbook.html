<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quadrantology: Your Logbook</title>
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="quadrantology.css">
  <style>
    /* ── Share modal extras ── */
    .share-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(44,44,44,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 1.5rem;
    }
    .share-modal-card {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 1.75rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .share-modal-card h3 { font-size: 1.1rem; margin: 0 0 0.25rem; }
    .share-modal-card .share-hint {
      font-size: 0.83rem;
      color: var(--secondary-text);
      margin: 0 0 1.25rem;
      line-height: 1.5;
    }
    .share-field-label {
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: var(--text);
    }
    .share-name-input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 0.95rem;
      font-family: inherit;
      margin-bottom: 1rem;
      box-sizing: border-box;
    }
    .share-name-input:focus { outline: none; border-color: var(--accent); }
    .share-preview {
      font-size: 0.82rem;
      color: var(--secondary-text);
      margin-bottom: 1.25rem;
    }
    .share-preview-chips {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 0.35rem;
    }
    .share-chip {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 3px;
      letter-spacing: 0.2px;
    }
    .share-chip.exit  { background: #d4ecf0; color: var(--exit-color); }
    .share-chip.voice { background: #f0d4d4; color: var(--voice-color); }
    .share-chip-arrow { color: var(--secondary-text); font-size: 0.7rem; }
    .share-url-wrap {
      display: none;
      margin-bottom: 1.25rem;
    }
    .share-url-box {
      display: flex;
      gap: 0.5rem;
    }
    .share-url-input {
      flex: 1;
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 0.78rem;
      font-family: monospace;
      background: var(--bg);
      color: var(--text);
      min-width: 0;
    }
    .share-copy-btn {
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--card-bg);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .share-copy-btn:hover { background: var(--border); }
    .share-url-note {
      font-size: 0.75rem;
      color: var(--secondary-text);
      margin-top: 0.4rem;
    }
    .share-modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">Quadrantology</a>
    <input type="checkbox" id="nav-toggle" class="nav-toggle">
    <label for="nav-toggle" class="nav-toggle-label"><span></span></label>
    <ul class="nav-links">
      <li><a href="test.html">The Test</a></li>
      <li><a href="theory.html">The Theory</a></li>
      <li><a href="logbook.html">Logbook</a></li>
      <li><a href="circle.html">Circle</a></li>
      <li><a href="analysis.html">Analysis</a></li>
      <li class="nav-dropdown">
        <a href="#archetypes">Archetypes &#9662;</a>
        <div class="nav-dropdown-content">
          <div class="dropdown-exit">Exit</div>
          <a href="hacker.html">Hacker</a>
          <a href="contrarian.html">Contrarian</a>
          <a href="legalist.html">Legalist</a>
          <div class="dropdown-voice">Voice</div>
          <a href="investigator.html">Investigator</a>
          <a href="holywarrior.html">Holy Warrior</a>
          <a href="operator.html">Operator</a>
        </div>

    </ul>
  </div>
</nav>

<main class="content">
  <div class="history-page">
    <div class="history-page-header">
      <div>
        <h1 id="history-title">Your Logbook</h1>
        <p id="history-subtitle" class="history-page-subtitle"></p>
      </div>
      <div class="history-page-actions" id="history-page-actions"></div>
    </div>
    <div id="history-list"></div>
  </div>
</main>

<footer class="site-footer">&copy; Quadrantology &middot; <a href="design_principles.html">Design Principles</a></footer>

<script>
(function() {
  var STORAGE_KEY = 'quadrantology_history';
  var SCORE_LABELS = ['Exit', 'Voice', 'Virtue', 'Consequentialist', 'Deontological'];
  var SCORE_CLASSES = ['exit-bar', 'voice-bar', 'ethics-bar', 'ethics-bar', 'ethics-bar'];
  var EXIT_SET = new Set(['Hacker', 'Contrarian', 'Legalist']);
  var ARCHETYPE_ABBR = {
    'Hacker':'H', 'Contrarian':'Cn', 'Legalist':'Lg',
    'Investigator':'In', 'Holy Warrior':'HW', 'Operator':'Op'
  };

  var minRunsToShare = 3; // default; overridden from protocol.json on load

  // Fetch protocol.json to get min_runs_to_share, then re-render
  fetch('data/protocol.json')
    .then(function(r) { return r.json(); })
    .then(function(p) {
      if (p && p.sharing && p.sharing.min_runs_to_share) {
        minRunsToShare = p.sharing.min_runs_to_share;
        render();
      }
    })
    .catch(function() {});

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  }

  function formatDate(iso) {
    try {
      var d = new Date(iso);
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' }) +
             ' at ' + d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
    } catch(e) { return iso; }
  }

  function arcClass(archetype) { return EXIT_SET.has(archetype) ? 'exit' : 'voice'; }

  // v2 runs with position data are shareable
  function getShareableRuns(h) {
    return h.filter(function(r) {
      return r.version === 2 && r.position && typeof r.position.ev === 'number';
    });
  }

  function render() {
    var name = localStorage.getItem('quadrantology_name') || '';
    var h = loadHistory();
    var count = h.length;
    var shareableRuns = getShareableRuns(h);
    var canShare = shareableRuns.length >= minRunsToShare;

    document.getElementById('history-title').textContent = name ? name + '\u2019s Logbook' : 'Your Logbook';
    document.getElementById('history-subtitle').textContent =
      count === 0 ? '' :
      count === 1 ? '1 result' : count + ' results';

    var actionsEl = document.getElementById('history-page-actions');
    if (count > 0) {
      actionsEl.innerHTML =
        (canShare ? '<button class="btn btn-primary btn-sm" onclick="shareArc()">Share my arc</button> ' : '') +
        '<button class="btn btn-secondary btn-sm" onclick="downloadHistory()">Download logbook</button> ' +
        '<button class="btn btn-secondary btn-sm" onclick="clearHistory()">Clear logbook</button>';
    } else {
      actionsEl.innerHTML = '';
    }

    var listEl = document.getElementById('history-list');
    if (count === 0) {
      listEl.innerHTML =
        '<div class="history-empty">' +
          '<p>No logbook entries on this device yet.</p>' +
          '<a href="test.html" class="btn btn-primary" style="margin-top:1rem;">Take the test</a>' +
        '</div>';
      return;
    }

    listEl.innerHTML = '';
    for (var i = 0; i < h.length; i++) {
      listEl.appendChild(renderEntry(h[i], i + 1, h.length));
    }
  }

  // Normalize a history record to a common shape regardless of version
  function normalize(entry) {
    if (entry.version === 2) {
      var s = entry.scores;
      return {
        archetype: entry.archetype,
        evBias: entry.ev_bias,
        scoresArr: [s.exit, s.voice, s.virtue, s.consequentialist, s.deontological],
        position: entry.position || null,
        questionCount: entry.run ? entry.run.length : null,
        version: 2
      };
    }
    // v1 legacy
    return {
      archetype: entry.archetype,
      evBias: entry.evBias,
      scoresArr: Array.isArray(entry.scores) ? entry.scores : [],
      position: null,
      questionCount: Array.isArray(entry.answers) ? entry.answers.length : null,
      version: 1
    };
  }

  function renderEntry(entry, num, total) {
    var n = normalize(entry);
    var card = document.createElement('div');
    card.className = 'history-entry';

    var biasLabel = '', biasClass = '';
    if (n.evBias === 1) { biasLabel = 'Exit'; biasClass = 'badge-exit'; }
    else if (n.evBias === 2) { biasLabel = 'Voice'; biasClass = 'badge-voice'; }
    var badgeHtml = biasLabel ? '<span class="badge ' + biasClass + '">' + biasLabel + '</span>' : '';

    var posHtml = '';
    if (n.position && n.position.ev !== undefined) {
      var evPct = ((n.position.ev + 1) / 2 * 100).toFixed(0); // map -1..+1 to 0..100%
      var e = n.position.ethics;
      posHtml =
        '<div class="history-position">' +
          '<span class="history-pos-label">E&harr;V</span>' +
          '<div class="history-pos-track">' +
            '<div class="history-pos-fill" style="width:' + evPct + '%"></div>' +
          '</div>' +
          '<span class="history-pos-labels"><span class="voice-label">V</span><span class="exit-label">E</span></span>' +
        '</div>' +
        '<div class="history-ethics-bar">' +
          '<div class="history-ethics-seg ethics-virtue" style="width:' + (e.virtue*100).toFixed(1) + '%" title="Virtue ' + (e.virtue*100).toFixed(0) + '%"></div>' +
          '<div class="history-ethics-seg ethics-conseq" style="width:' + (e.consequentialist*100).toFixed(1) + '%" title="Consequentialist ' + (e.consequentialist*100).toFixed(0) + '%"></div>' +
          '<div class="history-ethics-seg ethics-deont" style="width:' + (e.deontological*100).toFixed(1) + '%" title="Deontological ' + (e.deontological*100).toFixed(0) + '%"></div>' +
        '</div>' +
        '<div class="history-ethics-legend">' +
          '<span class="ethics-virtue-dot">&#9632;</span> Virtue ' + (e.virtue*100).toFixed(0) + '%' +
          ' &nbsp; <span class="ethics-conseq-dot">&#9632;</span> Conseq. ' + (e.consequentialist*100).toFixed(0) + '%' +
          ' &nbsp; <span class="ethics-deont-dot">&#9632;</span> Deont. ' + (e.deontological*100).toFixed(0) + '%' +
        '</div>';
    }

    var metaExtra = n.questionCount ? ' &middot; ' + n.questionCount + ' questions' : '';
    metaExtra += n.version === 1 ? ' &middot; <span class="version-tag">v1</span>' : '';

    card.innerHTML =
      '<div class="history-entry-header">' +
        '<div class="history-entry-meta">' +
          '<span class="history-entry-num">Run ' + (total - num + 1) + '</span>' +
          '<span class="history-entry-date">' + formatDate(entry.timestamp) + metaExtra + '</span>' +
        '</div>' +
        '<div class="history-entry-archetype">' +
          '<span class="history-archetype-name">' + entry.archetype + '</span> ' + badgeHtml +
        '</div>' +
      '</div>' +
      posHtml;

    if (n.scoresArr.length === 5) {
      var maxVal = Math.max.apply(null, n.scoresArr) || 1;
      var barsEl = document.createElement('div');
      barsEl.className = 'history-score-bars';
      for (var j = 0; j < 5; j++) {
        var pct = (n.scoresArr[j] / maxVal * 100).toFixed(0);
        var row = document.createElement('div');
        row.className = 'history-score-row';
        row.innerHTML =
          '<span class="history-score-label">' + SCORE_LABELS[j] + '</span>' +
          '<div class="history-score-track">' +
            '<div class="history-score-fill ' + SCORE_CLASSES[j] + '" style="width:' + pct + '%"></div>' +
          '</div>' +
          '<span class="history-score-val">' + n.scoresArr[j].toFixed(1) + '</span>';
        barsEl.appendChild(row);
      }
      card.appendChild(barsEl);
    }

    if (entry.note) {
      var noteEl = document.createElement('div');
      noteEl.className = 'history-note';
      noteEl.textContent = entry.note;
      card.appendChild(noteEl);
    }

    return card;
  }

  window.downloadHistory = function() {
    var h = loadHistory();
    var blob = new Blob([JSON.stringify(h, null, 2)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'quadrantology-logbook.json';
    a.click();
    URL.revokeObjectURL(a.href);
  };

  window.clearHistory = function() {
    var overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML =
      '<div class="modal-card">' +
        '<p class="modal-question">Download your history first?</p>' +
        '<div class="modal-actions">' +
          '<button class="btn btn-primary" id="modal-yes">Yes, download</button>' +
          '<button class="btn btn-secondary" id="modal-did">I already did</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);

    function close() { document.body.removeChild(overlay); }

    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    document.getElementById('modal-yes').onclick = function() { downloadHistory(); close(); };
    document.getElementById('modal-did').onclick = function() {
      close();
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem('quadrantology_name');
      render();
    };
  };

  // ── Share my arc ──────────────────────────────────────────────────────────

  async function buildShareUrl(name) {
    var h = loadHistory();
    var runs = getShareableRuns(h).slice(0, 3); // most recent 3, already newest-first

    var payload = {
      v: 1,
      name: name,
      results: runs.map(function(r) {
        var e = r.position.ethics;
        return {
          ts:        r.timestamp,
          archetype: r.archetype,
          ev:        r.position.ev,
          ethics:    [e.virtue, e.consequentialist, e.deontological]
        };
      })
    };

    var bytes = new TextEncoder().encode(JSON.stringify(payload));

    // Compress with deflate-raw
    var cs = new CompressionStream('deflate-raw');
    var writer = cs.writable.getWriter();
    var reader  = cs.readable.getReader();
    writer.write(bytes);
    writer.close();
    var chunks = [], total = 0;
    while (true) {
      var res = await reader.read();
      if (res.done) break;
      chunks.push(res.value);
      total += res.value.length;
    }
    var merged = new Uint8Array(total);
    var off = 0;
    chunks.forEach(function(c) { merged.set(c, off); off += c.length; });

    // base64url encode
    var b64 = btoa(String.fromCharCode.apply(null, merged));
    var b64url = b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');

    var base = window.location.origin +
               window.location.pathname.replace(/\/[^\/]*$/, '/');
    return base + 'r.html#v1:' + b64url;
  }

  window.shareArc = function() {
    var h = loadHistory();
    var shareableRuns = getShareableRuns(h);
    var defaultName = localStorage.getItem('quadrantology_name') || '';

    // Build preview chips (oldest → newest)
    var previewRuns = shareableRuns.slice(0, 3).slice().reverse();
    var chipsHtml = previewRuns.map(function(r, i) {
      var cls = EXIT_SET.has(r.archetype) ? 'exit' : 'voice';
      var abbr = ARCHETYPE_ABBR[r.archetype] || r.archetype;
      return (i > 0 ? '<span class="share-chip-arrow">›</span>' : '') +
             '<span class="share-chip ' + cls + '">' + abbr + '</span>';
    }).join('');

    var overlay = document.createElement('div');
    overlay.className = 'share-modal-overlay';
    overlay.innerHTML =
      '<div class="share-modal-card">' +
        '<h3>Share my arc</h3>' +
        '<p class="share-hint">Choose a name for this link — it appears on the recipient\'s screen and may differ from your display name. The URL encodes your last ' + Math.min(shareableRuns.length, 3) + ' results with no Q&amp;A data or journal notes.</p>' +
        '<div class="share-field-label">Name on share link</div>' +
        '<input class="share-name-input" id="share-name-input" type="text" value="' + defaultName.replace(/"/g, '&quot;') + '" placeholder="Your name" maxlength="60">' +
        '<div class="share-preview">' +
          'Arc preview (oldest → newest): ' +
          '<div class="share-preview-chips">' + chipsHtml + '</div>' +
        '</div>' +
        '<div class="share-url-wrap" id="share-url-wrap">' +
          '<div class="share-field-label">Share link</div>' +
          '<div class="share-url-box">' +
            '<input class="share-url-input" id="share-url-output" type="text" readonly>' +
            '<button class="share-copy-btn" onclick="copyShareUrl()">Copy</button>' +
          '</div>' +
          '<div class="share-url-note">Point-in-time snapshot. To share an updated arc, generate a new link.</div>' +
        '</div>' +
        '<div class="share-modal-actions">' +
          '<button class="btn btn-secondary btn-sm" onclick="closeShareModal()">Close</button>' +
          '<button class="btn btn-primary btn-sm" id="share-generate-btn" onclick="generateShareUrl()">Generate link</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeShareModal(); });
    setTimeout(function() {
      var inp = document.getElementById('share-name-input');
      if (inp) { inp.focus(); inp.select(); }
    }, 50);
  };

  window.generateShareUrl = async function() {
    var btn = document.getElementById('share-generate-btn');
    var nameInput = document.getElementById('share-name-input');
    if (!nameInput) return;
    var name = nameInput.value.trim() || 'Anonymous';

    btn.disabled = true;
    btn.textContent = 'Generating…';
    try {
      var url = await buildShareUrl(name);
      var outputEl = document.getElementById('share-url-output');
      if (outputEl) {
        outputEl.value = url;
        document.getElementById('share-url-wrap').style.display = '';
        outputEl.select();
      }
      btn.textContent = 'Regenerate';
    } catch(err) {
      btn.textContent = 'Error — try again';
      console.error('Share URL generation failed:', err);
    }
    btn.disabled = false;
  };

  window.copyShareUrl = function() {
    var inp = document.getElementById('share-url-output');
    if (!inp || !inp.value) return;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(inp.value).then(function() {
        var btn = inp.parentNode.querySelector('.share-copy-btn');
        if (btn) { btn.textContent = 'Copied!'; setTimeout(function() { btn.textContent = 'Copy'; }, 1800); }
      });
    } else {
      inp.select();
      document.execCommand('copy');
    }
  };

  window.closeShareModal = function() {
    var overlay = document.querySelector('.share-modal-overlay');
    if (overlay) document.body.removeChild(overlay);
  };

  render();
})();
</script>
<script src="v.js"></script>
</body>
