relationships:
  - name: Ray Chen
    relation: boyfriend (2 years)
    archetype: Hacker
    stub: software engineer at a mid-size tech company; builds tools; skeptical of his own employer's labour practices without being willing to confront them
    dynamic: loves Grace and is increasingly uncertain he can match her level of commitment to the work; their philosophical gap is widening; he is starting to understand that this is a compatibility question, not just a lifestyle difference; she has not fully acknowledged this yet
  - name: Martha Fuentes
    relation: organizing director and mentor
    archetype: Holy Warrior
    stub: veteran movement builder who has organised three successful campaigns over 20 years; has won and knows what winning costs
    dynamic: the mentor who most shaped Grace's strategic instincts; pushes Grace when she is losing nerve; is sometimes too much the absolutist to teach effective compromise; Grace is starting to notice the difference between Martha's principles and Martha's tactics
  - name: Brian Walsh
    relation: VP Communications at the targeted company
    archetype: Operator
    stub: focused on managing the narrative and protecting institutional reputation; not personally cruel; professionally ruthless
    dynamic: the professional adversary; Walsh is trying to neutralise Grace's campaign without engaging its substance; she finds this clarifying rather than demoralising; she has started watching his public statements carefully because they tell her what the company is most afraid of
  - name: Mei-Ling Liu
    relation: mother (age 54, Flushing)
    archetype: Operator
    stub: runs a dry-cleaning business she built from nothing over 20 years; focused on results, stability, and not antagonising the people you depend on
    dynamic: Grace's deepest source of love and friction; her mother built a life by working within the system; Grace's entire politics is a rejection of that strategy; they do not discuss this directly but it is present in every conversation; the business is what Grace is theoretically trying to help people like her mother escape from
  - name: Daniel Park
    relation: fellow law student and friend (UCLA JD programme)
    archetype: Legalist
    stub: meticulous legal reasoner; believes procedural tools are the only durable social change mechanism
    dynamic: the sharpest internal challenge to Grace's politics; he argues that her campaign tactics will lose in court; she argues that the legal tools he trusts were designed by people who didn't want her to win; they are probably both right
