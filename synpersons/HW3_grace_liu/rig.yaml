politics:
  leaning: progressive left; democratic socialist; believes collective action and structural change are the only levers that matter; skeptical of individual moral consumption as political action; supports BDS, Medicare for All, and debt cancellation without reservation; defines herself against what she calls "charity models" — approaches to social problems that serve the giver's conscience rather than the recipient's power; the union lawsuit against her campaign has given her a more complicated view of legal tools
