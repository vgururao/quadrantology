politics:
  leaning: progressive and pragmatic simultaneously — she believes the structural analysis is correct and that purity politics that wins arguments but loses programs is a luxury people on waiting lists cannot afford; votes consistently Democratic without enthusiasm; frustrated with the party's delivery failures and cannot afford to let that frustration show too often; her private politics are considerably to the left of her funder relationships require
