relationships:
  - name: Richard Park
    relation: board chair
    archetype: Legalist
    stub: retired attorney; detail-focused; wants procedural correctness before action; reads every financial report carefully
    dynamic: slows Diane down when she needs speed; she has learned to pre-package proposals for him with more documentation than should be necessary; the relationship is functional and occasionally exhausting; he has saved her twice from decisions that would have created legal exposure
  - name: Gerald Mason
    relation: major donor (largest single funder at ~$400k annually)
    archetype: Contrarian
    stub: skeptical of conventional nonprofit methods; expects disruption and proof of concept for his money; calls quarterly with opinions on program design
    dynamic: the most unpredictable relationship in her professional life; his money is load-bearing for two programs; his opinions are unsolicited and occasionally useful; she manages him as a stakeholder rather than a partner and knows he would be offended if he understood this
  - name: Keisha Brown
    relation: housing program director (direct report)
    archetype: Holy Warrior
    stub: advocates for housing residents with an intensity that burns bridges Diane needs; committed to the residents over the institution
    dynamic: inspiring and difficult; Diane mentors her carefully; Keisha sometimes does the right thing in the wrong way for the right reasons; the cost falls on the organisation; Diane is still deciding whether Keisha's growth trajectory is worth the cost
  - name: Marcus Foster
    relation: brother (age 43, Memphis)
    archetype: Hacker
    stub: electrician who repairs things that aren't supposed to be repairable; deeply practical; skeptical of institutions that don't deliver
    dynamic: Diane's clearest external view of whether the work matters; Marcus tells her when the programs would actually help a family he knows and when they wouldn't; these conversations are more useful than most board meetings
  - name: Dr. Pamela Reid
    relation: therapist (9-year relationship)
    archetype: Investigator
    stub: follows where the evidence in the session leads; does not let Diane's competence shield her from her own patterns
    dynamic: the relationship Diane has protected most carefully through every budget crisis; she considers it a professional operating expense as much as a personal one
